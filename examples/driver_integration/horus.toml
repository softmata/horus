[package]
name = "driver_integration"
version = "0.1.0"
description = "Hardware driver integration — loading drivers from config, simulated and real"
author = "softmata"
license = "Apache-2.0"
language = "rust"

[dependencies]
horus = "*"
horus_library = "*"

[drivers]
# Motor controller via serial (Terra driver)
motor = { terra = "dynamixel", port = "/dev/ttyUSB0", baudrate = "1000000" }

# IMU sensor via I2C
imu = { terra = "bno055", bus = "/dev/i2c-1", address = "0x28" }

# LiDAR via network
lidar = { terra = "rplidar", port = "/dev/ttyUSB1", baudrate = "256000" }

# Custom Python driver (local implementation)
gripper = { node = "GripperDriver" }
