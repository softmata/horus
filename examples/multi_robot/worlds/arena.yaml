name: "arena"
ground:
  enabled: true
  size: [15.0, 15.0]
  material:
    color: [0.5, 0.5, 0.5, 1.0]

lighting:
  directional:
    - direction: [-0.3, -1.0, -0.4]
      intensity: 10000.0
      shadows: true

robots:
  - name: "scout_1"
    urdf: "robots/scout.urdf"
    position: [-2.0, 0.05, -2.0]
    sensors:
      - type: lidar2d
        name: "scan"
        config:
          num_rays: 180
          max_range: 5.0
          rate_hz: 10.0

  - name: "scout_2"
    urdf: "robots/scout.urdf"
    position: [2.0, 0.05, -2.0]
    sensors:
      - type: lidar2d
        name: "scan"
        config:
          num_rays: 180
          max_range: 5.0
          rate_hz: 10.0

  - name: "scout_3"
    urdf: "robots/scout.urdf"
    position: [0.0, 0.05, 2.0]
    sensors:
      - type: lidar2d
        name: "scan"
        config:
          num_rays: 180
          max_range: 5.0
          rate_hz: 10.0

objects:
  # Arena boundary walls
  - type: box
    name: "wall_n"
    position: [0.0, 0.3, 5.0]
    size: [10.0, 0.6, 0.1]
    static: true

  - type: box
    name: "wall_s"
    position: [0.0, 0.3, -5.0]
    size: [10.0, 0.6, 0.1]
    static: true

  - type: box
    name: "wall_e"
    position: [5.0, 0.3, 0.0]
    size: [0.1, 0.6, 10.0]
    static: true

  - type: box
    name: "wall_w"
    position: [-5.0, 0.3, 0.0]
    size: [0.1, 0.6, 10.0]
    static: true
