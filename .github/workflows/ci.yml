# HORUS CI Pipeline
# Runs on all PRs and pushes to main/dev

name: CI

on:
  pull_request:
    branches: [main, master, dev]
  push:
    branches: [main, master, dev]

env:
  CARGO_TERM_COLOR: always
  # Allow warnings on dev branch, strict on main
  RUSTFLAGS: ${{ github.ref == 'refs/heads/main' && '-D warnings' || '-W warnings' }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-

      - name: Cargo Check
        run: cargo check --workspace --all-targets

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-

      - name: Clippy
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            cargo clippy --workspace --all-targets -- -D warnings
          else
            cargo clippy --workspace --all-targets
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # No caching for test job - build completely fresh to avoid linker errors
      # Caching caused issues with stale artifacts and filename collisions

      - name: Clean build artifacts
        run: cargo clean

      # Setup shared memory for HORUS tests
      - name: Setup Shared Memory
        run: |
          sudo mkdir -p /dev/shm/horus/topics
          sudo mkdir -p /dev/shm/horus/heartbeats
          sudo chmod 777 /dev/shm/horus /dev/shm/horus/topics /dev/shm/horus/heartbeats

      # Build and test in separate steps to avoid crate-type collision
      # Exclude horus_py from workspace build/test — it requires Python dev headers
      # and its extension-module feature prevents test linking. horus_py is tested
      # separately below with --no-default-features, and fully built in build-wheels.yml.
      - name: Build Workspace
        run: cargo build --workspace --exclude horus_py

      - name: Run Tests
        run: |
          # Use single-threaded tests to avoid race conditions in static discovery topic
          # (UnsafeCell<LocalState> is not thread-safe for parallel test access)
          cargo test --workspace --exclude horus_py --no-fail-fast -- --test-threads=1
        env:
          RUST_BACKTRACE: 1

      - name: Run horus_py unit tests
        run: |
          # Test horus_py with extension-module disabled (avoids Python linker dependency)
          cargo test -p horus_py --no-default-features -- --test-threads=1
        env:
          RUST_BACKTRACE: 1

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run Security Audit
        run: |
          # Run audit and report issues (don't fail on warnings)
          cargo audit --ignore RUSTSEC-2021-0140 --ignore RUSTSEC-2026-0002 || echo "Security audit found issues (non-blocking)"
        continue-on-error: true

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-doc-

      - name: Check Documentation
        run: |
          # Exclude horus_manager to avoid filename collision with horus library
          # (both would create target/doc/horus/ due to binary named 'horus')
          cargo doc --workspace --no-deps --exclude horus_manager
        env:
          RUSTDOCFLAGS: ${{ github.ref == 'refs/heads/main' && '-D warnings' || '' }}

  loom:
    name: Loom Concurrency Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-loom-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-loom-

      # Loom exhaustively explores all thread interleavings.
      # Tests use at most 3 threads with minimal operations to keep runtimes
      # tractable (seconds, not hours).
      - name: Loom — ring buffers (horus_core)
        run: cargo test -p horus_core --test loom_ring_buffers -- --nocapture
        env:
          RUST_LOG: loom=debug

      - name: Loom — watchdog / PRNG / deterministic clock (horus_core)
        run: cargo test -p horus_core --test loom_concurrency -- --nocapture
        env:
          RUST_LOG: loom=debug

      - name: Loom — HFrame seqlock (horus_library)
        run: cargo test -p horus_library --test loom_seqlock -- --nocapture
        env:
          RUST_LOG: loom=debug

  test-quality:
    name: Test Quality Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for stub test anti-patterns
        run: |
          FAILED=0

          echo "=== Checking for tautological assertions ==="
          # is_ok() || is_err() — always true, never tests anything
          if grep -rn 'is_ok().*||.*is_err()\|is_err().*||.*is_ok()' --include='*.rs' .; then
            echo "::error::Found tautological is_ok() || is_err() assertions"
            FAILED=1
          fi

          echo "=== Checking for standalone matches!() with semicolon ==="
          # matches!(...); as a statement — result is silently discarded
          # Multi-line assert!(matches!(...)) is fine and excluded
          BARE_MATCHES=$(grep -rn '^\s*matches!(' --include='*.rs' . | grep -v 'assert' | while read line; do
            file=$(echo "$line" | cut -d: -f1)
            lineno=$(echo "$line" | cut -d: -f2)
            prev=$(sed -n "$((lineno-1))p" "$file" 2>/dev/null)
            if ! echo "$prev" | grep -q 'assert'; then
              thisline=$(sed -n "${lineno}p" "$file")
              if echo "$thisline" | grep -q ';$'; then
                echo "$line"
              fi
            fi
          done)
          if [ -n "$BARE_MATCHES" ]; then
            echo "$BARE_MATCHES"
            echo "::error::Found standalone matches!() with semicolon — bool return is discarded"
            FAILED=1
          fi

          echo "=== Checking for let _ = format!() in tests ==="
          # let _ = format!("{:?}", x) in test code discards Debug output without checking
          if grep -rn 'let _ = format!' --include='*.rs' . | grep -i 'test\|#\[cfg(test'; then
            echo "::warning::Found 'let _ = format!()' in test code — assert the output instead"
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::Test quality checks failed. See above for details."
            exit 1
          fi

          echo "All test quality checks passed!"

  # Final status check
  ci-success:
    name: CI Success
    needs: [check, fmt, clippy, test, doc, security, loom, test-quality]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Results
        run: |
          # Core checks must pass
          if [[ "${{ needs.check.result }}" == "success" ]] && \
             [[ "${{ needs.fmt.result }}" == "success" ]] && \
             [[ "${{ needs.clippy.result }}" == "success" ]] && \
             [[ "${{ needs.test.result }}" == "success" ]] && \
             [[ "${{ needs.doc.result }}" == "success" ]] && \
             [[ "${{ needs.loom.result }}" == "success" ]] && \
             [[ "${{ needs.test-quality.result }}" == "success" ]]; then
            echo "All core checks passed!"
            # Security is informational (has continue-on-error)
            echo "Security audit: ${{ needs.security.result }}"
            exit 0
          else
            echo "Some checks failed"
            echo "check: ${{ needs.check.result }}"
            echo "fmt: ${{ needs.fmt.result }}"
            echo "clippy: ${{ needs.clippy.result }}"
            echo "test: ${{ needs.test.result }}"
            echo "doc: ${{ needs.doc.result }}"
            echo "loom: ${{ needs.loom.result }}"
            echo "test-quality: ${{ needs.test-quality.result }}"
            exit 1
          fi
