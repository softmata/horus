# Monitor Test Suite
# Comprehensive test pipeline for horus_manager monitor functionality.
#
# Tiers:
#   - Unit tests: Run on every PR (fast, no SHM needed for most)
#   - UAT integration tests: Run on PR + merge to main
#   - Stress & chaos tests: Nightly schedule only (slow, resource-intensive)

name: Monitor Tests

on:
  pull_request:
    branches: [main, master, dev]
    paths:
      - 'horus_manager/**'
      - 'horus_core/**'
      - 'horus_library/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  push:
    branches: [main, master, dev]
    paths:
      - 'horus_manager/**'
      - 'horus_core/**'
      - 'horus_library/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  schedule:
    # Nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  HORUS_NAMESPACE: ci_${{ github.run_id }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  #  Unit Tests — fast, every PR
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-monitor-unit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-monitor-unit-

      - name: Setup SHM directories
        run: |
          # Create namespaced SHM directory structure
          SHM_DIR="/dev/shm/horus_ci_${GITHUB_RUN_ID:-$$}"
          sudo mkdir -p "$SHM_DIR"/{topics/horus_topic,nodes,control,network,scheduler}
          sudo chmod -R 777 "$SHM_DIR"

      - name: Run unit tests (lib)
        run: cargo test -p horus_manager --lib -- --test-threads=1

      - name: Run monitor_tests integration
        run: cargo test -p horus_manager --test monitor_tests -- --test-threads=1

  # ─────────────────────────────────────────────────────────────────────────────
  #  UAT Integration Tests — every PR + merge
  # ─────────────────────────────────────────────────────────────────────────────
  uat-tests:
    name: UAT Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-monitor-uat-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-monitor-uat-

      - name: Setup SHM directories
        run: |
          # Create namespaced SHM directory structure
          SHM_DIR="/dev/shm/horus_ci_${GITHUB_RUN_ID:-$$}"
          sudo mkdir -p "$SHM_DIR"/{topics/horus_topic,nodes,control,network,scheduler}
          sudo chmod -R 777 "$SHM_DIR"

      - name: UAT — Node Discovery
        run: cargo test -p horus_manager --test uat_node_discovery -- --test-threads=1

      - name: UAT — Topic Monitoring
        run: cargo test -p horus_manager --test uat_topic_monitoring -- --test-threads=1

      - name: UAT — Parameter Management
        run: cargo test -p horus_manager --test uat_parameter_management -- --test-threads=1

      - name: UAT — Recording & Debug
        run: cargo test -p horus_manager --test uat_recording_debug -- --test-threads=1

      - name: UAT — WebSocket Live Updates
        run: cargo test -p horus_manager --test uat_websocket_live -- --test-threads=1

      - name: UAT — Auth Flow
        run: cargo test -p horus_manager --test uat_auth_flow -- --test-threads=1

  # ─────────────────────────────────────────────────────────────────────────────
  #  Stress & Chaos Tests — nightly only
  # ─────────────────────────────────────────────────────────────────────────────
  stress-tests:
    name: Stress Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # No cache for stress tests — clean build avoids stale artifact issues
      - name: Clean build
        run: cargo clean

      - name: Setup SHM directories
        run: |
          # Create namespaced SHM directory structure
          SHM_DIR="/dev/shm/horus_ci_${GITHUB_RUN_ID:-$$}"
          sudo mkdir -p "$SHM_DIR"/{topics/horus_topic,nodes,control,network,scheduler}
          sudo chmod -R 777 "$SHM_DIR"

      - name: Stress — Scale (1000 nodes)
        run: cargo test -p horus_manager --test stress_scale -- --test-threads=1
        timeout-minutes: 10

      - name: Stress — Churn (rapid lifecycle)
        run: cargo test -p horus_manager --test stress_churn -- --test-threads=1
        timeout-minutes: 10

  chaos-tests:
    name: Chaos Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clean build
        run: cargo clean

      - name: Setup SHM directories
        run: |
          # Create namespaced SHM directory structure
          SHM_DIR="/dev/shm/horus_ci_${GITHUB_RUN_ID:-$$}"
          sudo mkdir -p "$SHM_DIR"/{topics/horus_topic,nodes,control,network,scheduler}
          sudo chmod -R 777 "$SHM_DIR"

      - name: Chaos — Failure injection
        run: cargo test -p horus_manager --test chaos_failure -- --test-threads=1
        timeout-minutes: 5

      - name: Chaos — Concurrent abuse
        run: cargo test -p horus_manager --test chaos_concurrent -- --test-threads=1
        timeout-minutes: 5

  # ─────────────────────────────────────────────────────────────────────────────
  #  Final status gate
  # ─────────────────────────────────────────────────────────────────────────────
  monitor-tests-success:
    name: Monitor Tests Success
    runs-on: ubuntu-latest
    if: always()
    needs: [unit-tests, uat-tests, stress-tests, chaos-tests]
    steps:
      - name: Check results
        run: |
          echo "unit-tests: ${{ needs.unit-tests.result }}"
          echo "uat-tests: ${{ needs.uat-tests.result }}"
          echo "stress-tests: ${{ needs.stress-tests.result }}"
          echo "chaos-tests: ${{ needs.chaos-tests.result }}"

          # Unit and UAT must pass (always run)
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "Unit tests failed!"
            exit 1
          fi
          if [[ "${{ needs.uat-tests.result }}" != "success" ]]; then
            echo "UAT tests failed!"
            exit 1
          fi

          # Stress/chaos only run on schedule — skip check if skipped
          if [[ "${{ needs.stress-tests.result }}" == "failure" ]]; then
            echo "Stress tests failed!"
            exit 1
          fi
          if [[ "${{ needs.chaos-tests.result }}" == "failure" ]]; then
            echo "Chaos tests failed!"
            exit 1
          fi

          echo "All monitor tests passed!"
