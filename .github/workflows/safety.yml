# HORUS Safety Checks
# MIRI and other safety-focused testing
# Runs weekly and on-demand

name: Safety

on:
  schedule:
    # Run weekly on Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      run_miri:
        description: 'Run MIRI checks'
        required: false
        default: true
        type: boolean
  pull_request:
    branches: [main]
    paths:
      # Only run on PRs that touch unsafe code
      - 'horus_core/src/memory/**'
      - 'horus_core/src/communication/**'

env:
  CARGO_TERM_COLOR: always
  HORUS_NAMESPACE: ci_${{ github.run_id }}

jobs:
  miri:
    name: MIRI - Undefined Behavior Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust Nightly with MIRI
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Setup MIRI
        run: cargo miri setup

      # Setup shared memory for HORUS tests
      - name: Setup Shared Memory
        run: |
          # Create namespaced SHM directory structure
          SHM_DIR="/dev/shm/horus_ci_${GITHUB_RUN_ID:-$$}"
          sudo mkdir -p "$SHM_DIR"/{topics,nodes,control,network,scheduler}
          sudo chmod 777 "$SHM_DIR" "$SHM_DIR"/topics

      # Run MIRI on core modules with unsafe code
      - name: MIRI - horus_core memory module (unit tests)
        run: |
          cargo miri test -p horus_core --lib -- memory::
        env:
          MIRIFLAGS: -Zmiri-disable-isolation -Zmiri-permissive-provenance

      - name: MIRI - horus_core memory safety integration tests
        run: |
          cargo miri test -p horus_core --test memory_safety
        env:
          MIRIFLAGS: -Zmiri-disable-isolation -Zmiri-permissive-provenance

      - name: MIRI - horus_core communication module
        run: |
          cargo miri test -p horus_core --lib -- communication::
        env:
          MIRIFLAGS: -Zmiri-disable-isolation -Zmiri-permissive-provenance

      # Run MIRI on horus_library Pod types (landmark, tracking, detection, segmentation)
      - name: MIRI - horus_library Pod types
        run: |
          cargo miri test -p horus_library -- landmark:: tracking:: detection:: segmentation::
        env:
          MIRIFLAGS: -Zmiri-disable-isolation -Zmiri-permissive-provenance

  asan:
    name: AddressSanitizer - Memory Error Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      # Setup shared memory for HORUS tests
      - name: Setup Shared Memory
        run: |
          # Create namespaced SHM directory structure
          SHM_DIR="/dev/shm/horus_ci_${GITHUB_RUN_ID:-$$}"
          sudo mkdir -p "$SHM_DIR"/{topics,nodes,control,network,scheduler}
          sudo chmod 777 "$SHM_DIR" "$SHM_DIR"/topics

      - name: Run Tests with AddressSanitizer
        run: |
          cargo +nightly test --workspace --lib -Zbuild-std --target x86_64-unknown-linux-gnu
        env:
          RUSTFLAGS: -Zsanitizer=address
          RUSTDOCFLAGS: -Zsanitizer=address
          ASAN_OPTIONS: detect_leaks=1:detect_stack_use_after_return=1

  tsan:
    name: ThreadSanitizer - Data Race Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      # Setup shared memory for HORUS tests
      - name: Setup Shared Memory
        run: |
          # Create namespaced SHM directory structure
          SHM_DIR="/dev/shm/horus_ci_${GITHUB_RUN_ID:-$$}"
          sudo mkdir -p "$SHM_DIR"/{topics,nodes,control,network,scheduler}
          sudo chmod 777 "$SHM_DIR" "$SHM_DIR"/topics

      - name: Run Concurrent Tests with ThreadSanitizer
        run: |
          cargo +nightly test --workspace --lib -Zbuild-std --target x86_64-unknown-linux-gnu -- --test-threads=1
        env:
          RUSTFLAGS: -Zsanitizer=thread
          TSAN_OPTIONS: second_deadlock_stack=1
