# Core CI: check, fmt, clippy, test, doc, loom, test-quality, security
# Runs on every MR and push to main/dev
# Replaces: ci.yml, feature-matrix.yml, monitor-tests.yml, docker-distro-tests.yml

# ═══════════════════════════════════════════════════════════════
# Lint Stage
# ═══════════════════════════════════════════════════════════════

check:
  extends: [.rust-base, .on-mr-or-main]
  stage: lint
  script:
    - cargo check --workspace --all-targets

fmt:
  extends: [.rust-base, .on-mr-or-main]
  stage: lint
  script:
    - cargo fmt --all -- --check

clippy:
  extends: [.rust-base, .on-mr-or-main]
  stage: lint
  variables:
    RUSTFLAGS: >-
      $( [ "$CI_COMMIT_BRANCH" = "main" ] && echo "-D warnings" || echo "-W warnings" )
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        cargo clippy --workspace --all-targets -- -D warnings
      else
        cargo clippy --workspace --all-targets
      fi

test-quality:
  extends: [.rust-base, .on-mr-or-main]
  stage: lint
  script:
    - |
      FAILED=0

      echo "=== Checking for tautological assertions ==="
      if grep -rn 'is_ok().*||.*is_err()\|is_err().*||.*is_ok()' --include='*.rs' .; then
        echo "ERROR: Found tautological is_ok() || is_err() assertions"
        FAILED=1
      fi

      echo "=== Checking for standalone matches!() with semicolon ==="
      BARE_MATCHES=$(grep -rn '^\s*matches!(' --include='*.rs' . | grep -v 'assert' | while read line; do
        file=$(echo "$line" | cut -d: -f1)
        lineno=$(echo "$line" | cut -d: -f2)
        prev=$(sed -n "$((lineno-1))p" "$file" 2>/dev/null)
        if ! echo "$prev" | grep -q 'assert'; then
          thisline=$(sed -n "${lineno}p" "$file")
          if echo "$thisline" | grep -q ';$'; then
            echo "$line"
          fi
        fi
      done)
      if [ -n "$BARE_MATCHES" ]; then
        echo "$BARE_MATCHES"
        echo "ERROR: Found standalone matches!() with semicolon"
        FAILED=1
      fi

      [ "$FAILED" -eq 0 ] || exit 1
      echo "All test quality checks passed!"

# ═══════════════════════════════════════════════════════════════
# Test Stage
# ═══════════════════════════════════════════════════════════════

test:
  extends: [.rust-base, .shm-setup, .on-mr-or-main]
  stage: test
  needs: [check, fmt, clippy]
  before_script:
    - apt-get update -qq && apt-get install -y -qq libudev-dev pkg-config > /dev/null
    - rustup component add rustfmt clippy
    - |
      SHM_DIR="/dev/shm/horus_ci_${CI_PIPELINE_ID}"
      mkdir -p "$SHM_DIR"/{topics,nodes,control,network,scheduler}
      chmod 777 "$SHM_DIR" "$SHM_DIR"/topics
  script:
    - cargo clean
    - cargo build --workspace --exclude horus_py
    - cargo test --workspace --exclude horus_py --no-fail-fast -- --test-threads=1
    - cargo test -p horus_py --no-default-features -- --test-threads=1

doc:
  extends: [.rust-base, .on-mr-or-main]
  stage: test
  needs: [check]
  variables:
    RUSTDOCFLAGS: >-
      $( [ "$CI_COMMIT_BRANCH" = "main" ] && echo "-D warnings" || echo "" )
  script:
    - cargo doc --workspace --no-deps --exclude horus_manager

security-audit:
  extends: [.rust-base, .on-mr-or-main]
  stage: test
  needs: []
  allow_failure: true
  script:
    - cargo install cargo-audit --locked 2>/dev/null || true
    - cargo audit --ignore RUSTSEC-2021-0140 --ignore RUSTSEC-2026-0002 || echo "Security audit found issues (non-blocking)"

loom:
  extends: [.rust-base, .on-mr-or-main]
  stage: test
  needs: [check]
  variables:
    RUST_LOG: loom=debug
  script:
    - cargo test -p horus_core --test loom_ring_buffers -- --nocapture
    - cargo test -p horus_core --test loom_concurrency -- --nocapture
    - cargo test -p horus_core --test loom_migration -- --nocapture
    - cargo test -p horus_core --test loom_participant -- --nocapture
    - cargo test -p horus_library --test loom_seqlock -- --nocapture

# ═══════════════════════════════════════════════════════════════
# Feature Matrix (weekly + manual)
# ═══════════════════════════════════════════════════════════════

feature-minimal:
  extends: [.rust-base]
  stage: test
  rules:
    - !reference [.on-mr-or-main, rules]
    - !reference [.on-schedule, rules]
  script:
    - cargo check --workspace --no-default-features

feature-all:
  extends: [.rust-base]
  stage: test
  allow_failure: true  # some features may conflict
  rules:
    - !reference [.on-mr-or-main, rules]
    - !reference [.on-schedule, rules]
  script:
    - cargo check --workspace --all-features

feature-python:
  extends: [.rust-base]
  stage: test
  rules:
    - !reference [.on-mr-or-main, rules]
    - !reference [.on-schedule, rules]
  before_script:
    - apt-get update -qq && apt-get install -y -qq libudev-dev pkg-config python3-dev python3-pip > /dev/null
    - rustup component add rustfmt clippy
    - pip3 install maturin --break-system-packages 2>/dev/null || pip3 install maturin
  script:
    - cd horus_py && maturin build
  allow_failure: true

# ═══════════════════════════════════════════════════════════════
# Monitor Tests
# ═══════════════════════════════════════════════════════════════

monitor-unit:
  extends: [.rust-base, .shm-setup]
  stage: test
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - horus_manager/**/*
        - horus_core/**/*
        - horus_library/**/*
        - Cargo.toml
        - Cargo.lock
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"
  before_script:
    - apt-get update -qq && apt-get install -y -qq libudev-dev pkg-config > /dev/null
    - rustup component add rustfmt clippy
    - |
      SHM_DIR="/dev/shm/horus_ci_${CI_PIPELINE_ID}"
      mkdir -p "$SHM_DIR"/{topics/horus_topic,nodes,control,network,scheduler}
      chmod -R 777 "$SHM_DIR"
  script:
    - cargo test -p horus_manager --lib -- --test-threads=1
    - cargo test -p horus_manager --test monitor_tests -- --test-threads=1

monitor-uat:
  extends: [.rust-base, .shm-setup]
  stage: test
  needs: [monitor-unit]
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - horus_manager/**/*
        - horus_core/**/*
        - horus_library/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"
  before_script:
    - apt-get update -qq && apt-get install -y -qq libudev-dev pkg-config > /dev/null
    - rustup component add rustfmt clippy
    - |
      SHM_DIR="/dev/shm/horus_ci_${CI_PIPELINE_ID}"
      mkdir -p "$SHM_DIR"/{topics/horus_topic,nodes,control,network,scheduler}
      chmod -R 777 "$SHM_DIR"
  script:
    - cargo test -p horus_manager --test uat_node_discovery -- --test-threads=1
    - cargo test -p horus_manager --test uat_topic_monitoring -- --test-threads=1
    - cargo test -p horus_manager --test uat_parameter_management -- --test-threads=1
    - cargo test -p horus_manager --test uat_recording_debug -- --test-threads=1
    - cargo test -p horus_manager --test uat_websocket_live -- --test-threads=1
    - cargo test -p horus_manager --test uat_auth_flow -- --test-threads=1

monitor-stress:
  extends: [.rust-base, .shm-setup, .on-schedule]
  stage: test
  timeout: 20m
  before_script:
    - apt-get update -qq && apt-get install -y -qq libudev-dev pkg-config > /dev/null
    - rustup component add rustfmt clippy
    - cargo clean
    - |
      SHM_DIR="/dev/shm/horus_ci_${CI_PIPELINE_ID}"
      mkdir -p "$SHM_DIR"/{topics/horus_topic,nodes,control,network,scheduler}
      chmod -R 777 "$SHM_DIR"
  script:
    - cargo test -p horus_manager --test stress_scale -- --test-threads=1
    - cargo test -p horus_manager --test stress_churn -- --test-threads=1
    - cargo test -p horus_manager --test chaos_failure -- --test-threads=1
    - cargo test -p horus_manager --test chaos_concurrent -- --test-threads=1

# ═══════════════════════════════════════════════════════════════
# Docker Distro Tests (weekly + manual)
# ═══════════════════════════════════════════════════════════════

.docker-distro:
  stage: test
  image: docker:latest
  services:
    - docker:dind
  rules:
    - !reference [.on-mr-or-main, rules]
    - !reference [.on-schedule, rules]
  script:
    - docker build -f tests/docker/Dockerfile.${DISTRO} -t horus-test-${DISTRO} .
    - docker run --rm --tmpfs /dev/shm:rw,nosuid,nodev,exec,size=256m horus-test-${DISTRO}
    - docker run --rm --tmpfs /dev/shm:rw,nosuid,nodev,exec,size=256m horus-test-${DISTRO} bash /horus/tests/docker/test_user_workflow.sh

distro-ubuntu:
  extends: .docker-distro
  variables:
    DISTRO: ubuntu

distro-debian:
  extends: .docker-distro
  variables:
    DISTRO: debian

distro-fedora:
  extends: .docker-distro
  variables:
    DISTRO: fedora

distro-alpine:
  extends: .docker-distro
  variables:
    DISTRO: alpine

distro-arch:
  extends: .docker-distro
  variables:
    DISTRO: arch
