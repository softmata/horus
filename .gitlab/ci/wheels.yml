# Python Wheel Builds
# Replaces: build-wheels.yml
# Runs on tags and manual trigger

.wheel-base:
  stage: build
  rules:
    - !reference [.on-tag, rules]
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  artifacts:
    paths:
      - horus_py/dist/
    expire_in: 7 days

wheels-linux-x86_64:
  extends: .wheel-base
  image: quay.io/pypa/manylinux_2_28_x86_64
  script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
    - pip install maturin
    - cd horus_py && maturin build --release --out dist --find-interpreter

wheels-linux-aarch64:
  extends: .wheel-base
  image: quay.io/pypa/manylinux_2_28_aarch64
  tags: [arm64]
  script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
    - pip install maturin
    - cd horus_py && maturin build --release --out dist --find-interpreter

wheels-macos:
  extends: .wheel-base
  tags: [macos]
  script:
    - pip3 install maturin
    - cd horus_py && maturin build --release --out dist --find-interpreter

wheels-windows:
  extends: .wheel-base
  tags: [windows]
  script:
    - pip install maturin
    - cd horus_py && maturin build --release --out dist --find-interpreter

wheels-sdist:
  extends: .wheel-base
  image: python:3.11
  script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
    - pip install maturin
    - cd horus_py && maturin sdist --out dist

# Test wheel installation
wheels-test-install:
  stage: build
  image: python:${PYTHON_VERSION}
  needs:
    - job: wheels-linux-x86_64
      artifacts: true
  rules:
    - !reference [.on-tag, rules]
  parallel:
    matrix:
      - PYTHON_VERSION: ['3.9', '3.10', '3.11', '3.12']
  script:
    - pip install --find-links=horus_py/dist --no-index horus-robotics
    - python -c "import horus; print(f'Successfully imported horus {horus.__version__}')"

# Publish to PyPI (manual gate)
wheels-publish:
  stage: release
  image: python:3.11
  needs:
    - wheels-linux-x86_64
    - wheels-linux-aarch64
    - wheels-macos
    - wheels-windows
    - wheels-sdist
  rules:
    - !reference [.on-tag, rules]
  when: manual
  script:
    - pip install maturin twine
    - twine upload horus_py/dist/*
  variables:
    TWINE_USERNAME: __token__
    TWINE_PASSWORD: $PYPI_TOKEN
