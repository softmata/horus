# Release: build binaries, create GitLab release
# Replaces: release.yml

.release-build:
  stage: build
  rules:
    - !reference [.on-tag, rules]

release-linux-amd64:
  extends: .release-build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq libudev-dev pkg-config > /dev/null
  script:
    - cargo build --release --target x86_64-unknown-linux-gnu -p horus_manager
    - strip target/x86_64-unknown-linux-gnu/release/horus
    - cd target/x86_64-unknown-linux-gnu/release && tar czf $CI_PROJECT_DIR/horus-linux-amd64.tar.gz horus
  artifacts:
    paths: [horus-linux-amd64.tar.gz]

release-linux-arm64:
  extends: .release-build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq libudev-dev pkg-config gcc-aarch64-linux-gnu > /dev/null
    - rustup target add aarch64-unknown-linux-gnu
    - |
      mkdir -p .cargo
      echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
      echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
  script:
    - cargo build --release --target aarch64-unknown-linux-gnu -p horus_manager
    - aarch64-linux-gnu-strip target/aarch64-unknown-linux-gnu/release/horus || true
    - cd target/aarch64-unknown-linux-gnu/release && tar czf $CI_PROJECT_DIR/horus-linux-arm64.tar.gz horus
  artifacts:
    paths: [horus-linux-arm64.tar.gz]

release-macos-amd64:
  extends: .release-build
  tags: [macos]
  script:
    - cargo build --release --target x86_64-apple-darwin -p horus_manager
    - strip target/x86_64-apple-darwin/release/horus
    - cd target/x86_64-apple-darwin/release && tar czf $CI_PROJECT_DIR/horus-macos-amd64.tar.gz horus
  artifacts:
    paths: [horus-macos-amd64.tar.gz]

release-macos-arm64:
  extends: .release-build
  tags: [macos]
  script:
    - cargo build --release --target aarch64-apple-darwin -p horus_manager
    - strip target/aarch64-apple-darwin/release/horus
    - cd target/aarch64-apple-darwin/release && tar czf $CI_PROJECT_DIR/horus-macos-arm64.tar.gz horus
  artifacts:
    paths: [horus-macos-arm64.tar.gz]

release-windows-amd64:
  extends: .release-build
  tags: [windows]
  script:
    - cargo build --release --target x86_64-pc-windows-msvc -p horus_manager
    - Compress-Archive -Path target/x86_64-pc-windows-msvc/release/horus.exe -DestinationPath horus-windows-amd64.zip
  artifacts:
    paths: [horus-windows-amd64.zip]

# Create GitLab Release with all artifacts
create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - release-linux-amd64
    - release-linux-arm64
    - release-macos-amd64
    - release-macos-arm64
    - release-windows-amd64
  rules:
    - !reference [.on-tag, rules]
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG"
    assets:
      links:
        - name: horus-linux-amd64.tar.gz
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/horus-linux-amd64.tar.gz"
          link_type: package
        - name: horus-linux-arm64.tar.gz
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/horus-linux-arm64.tar.gz"
          link_type: package
        - name: horus-macos-amd64.tar.gz
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/horus-macos-amd64.tar.gz"
          link_type: package
        - name: horus-macos-arm64.tar.gz
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/horus-macos-arm64.tar.gz"
          link_type: package
        - name: horus-windows-amd64.zip
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/horus-windows-amd64.zip"
          link_type: package
