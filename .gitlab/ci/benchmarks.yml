# Benchmarks: performance regression detection
# Replaces: benchmarks.yml
# Runs on push to main/dev, weekly, and on-demand

benchmarks:
  extends: [.rust-base, .shm-setup]
  stage: benchmark
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"
    - !reference [.on-schedule, rules]
  variables:
    REGRESSION_THRESHOLD: "10"
  before_script:
    - apt-get update -qq && apt-get install -y -qq libudev-dev pkg-config gnuplot > /dev/null
    - rustup component add rustfmt clippy
    - |
      SHM_DIR="/dev/shm/horus_ci_${CI_PIPELINE_ID}"
      mkdir -p "$SHM_DIR"/{topics,nodes,control,network,scheduler}
      chmod 777 "$SHM_DIR" "$SHM_DIR"/topics
    # Optimize CPU for consistent results (may fail in containers)
    - echo "performance" | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor 2>/dev/null || true
    - echo 1 | tee /sys/devices/system/cpu/intel_pstate/no_turbo 2>/dev/null || true
  script:
    - cd benchmarks && cargo build --release
    - cargo run --release --bin cross_process_benchmark | tee benchmark-results.txt
    - cargo run --release --bin robotics_messages_benchmark | tee -a benchmark-results.txt
    - |
      mkdir -p benchmark-report
      cp benchmark-results.txt benchmark-report/
      echo "## Benchmark Results" > benchmark-report/summary.md
      cat benchmark-results.txt >> benchmark-report/summary.md
      echo "" >> benchmark-report/summary.md
      echo "Regression threshold: ${REGRESSION_THRESHOLD}%" >> benchmark-report/summary.md
  artifacts:
    paths:
      - benchmarks/benchmark-report/
      - benchmarks/benchmark-results.txt
    expire_in: 30 days
  cache:
    key: benchmarks-${CI_COMMIT_REF_SLUG}
    paths: [.cargo/, target/]
