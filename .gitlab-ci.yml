# HORUS GitLab CI/CD Pipeline
# Migrated from GitHub Actions (14 workflows)
#
# Runner requirements:
#   - Linux shared runners (default): Docker-based, used for most jobs
#   - macOS runners: tagged 'macos' (for parity/multi-platform)
#   - macOS ARM64 runners: tagged 'macos-arm64' (Apple Silicon)
#   - Windows runners: tagged 'windows' (for parity/multi-platform)
#
# Schedules (configure in GitLab UI → CI/CD → Schedules):
#   - Weekly Monday 00:00 UTC: benchmarks, feature-matrix
#   - Weekly Tuesday 04:00 UTC: multi-platform
#   - Weekly Wednesday 03:00 UTC: docker-distro
#   - Weekly Sunday 02:00 UTC: safety (MIRI/ASAN/TSAN)
#   - Daily 03:00 UTC: cross-platform-parity, monitor stress/chaos
#   - Daily 05:00 UTC: integration-tests

stages:
  - lint
  - test
  - safety
  - integration
  - platform
  - benchmark
  - coverage
  - build
  - release

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  RUST_BACKTRACE: "1"
  FF_USE_FASTZIP: "true"
  HORUS_NAMESPACE: ci_$CI_PIPELINE_ID

# ═══════════════════════════════════════════════════════════════
# Templates
# ═══════════════════════════════════════════════════════════════

.rust-base:
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq libudev-dev pkg-config > /dev/null
    - rustup component add rustfmt clippy
  cache:
    key: ${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/
      - target/
    policy: pull-push

.shm-setup:
  before_script:
    - apt-get update -qq && apt-get install -y -qq libudev-dev pkg-config > /dev/null
    - rustup component add rustfmt clippy
    - |
      SHM_DIR="/dev/shm/horus_ci_${CI_PIPELINE_ID}"
      mkdir -p "$SHM_DIR"/{topics,nodes,control,network,scheduler}
      chmod 777 "$SHM_DIR" "$SHM_DIR"/topics

.on-mr-or-main:
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "master"

.on-schedule:
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"  # manual trigger

.on-tag:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

include:
  - local: .gitlab/ci/core.yml
  - local: .gitlab/ci/integration.yml
  - local: .gitlab/ci/safety.yml
  - local: .gitlab/ci/platform.yml
  - local: .gitlab/ci/benchmarks.yml
  - local: .gitlab/ci/coverage.yml
  - local: .gitlab/ci/wheels.yml
  - local: .gitlab/ci/release.yml
